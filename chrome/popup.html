<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Allegro Clean View</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            width: 220px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(145deg, #ff9f1a 0%, #ff7a00 100%);
            color: #2f200f;
        }

        .popup {
            display: grid;
            gap: 8px;
        }

        .card {
            background: #fff6ed;
            border: 1px solid #ff8c00;
            border-radius: 8px;
            padding: 8px;
            display: grid;
            gap: 6px;
        }

        .title {
            font-size: 12px;
            font-weight: 700;
            color: #5a2a00;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #ff7a00;
            cursor: pointer;
        }

        .product-row {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .product-row label {
            flex: 0 0 auto;
        }

        .toggle-subsettings {
            border: none;
            padding: 0;
            font-size: 14px;
            font-weight: 700;
            line-height: 1;
            background: transparent;
            color: #5a2a00;
            cursor: pointer;
        }

        .subsettings {
            margin-left: 22px;
            display: grid;
            gap: 4px;
        }

        .subsettings.is-collapsed {
            display: none;
        }

        .subsettings label {
            font-size: 12px;
            line-height: 1.25;
        }

        #toggle-extension {
            border: 1px solid #ff8c00;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            background: #fff1e0;
            color: #5a2a00;
            cursor: pointer;
        }

        #toggle-extension.is-disabled {
            background: #f5dcdc;
            border-color: #c87474;
            color: #6b1f1f;
        }

        #toggle-extension:disabled {
            opacity: 0.7;
            cursor: default;
        }
    </style>
</head>
<body>
<div class="popup">
    <button id="toggle-extension" type="button">Wyłącz wtyczkę</button>
    <div class="card">
        <div class="title">Działanie wtyczki</div>
        <div class="product-row">
            <label><input id="setting-product" type="checkbox">Strona produktu</label>
            <button id="toggle-product-sections" class="toggle-subsettings" type="button" aria-label="Rozwiń ustawienia strony produktu" aria-expanded="false">▾</button>
        </div>
        <div id="product-subsettings" class="subsettings is-collapsed">
            <label><input id="setting-product-others-also-viewed" type="checkbox">Inni klienci oglądali również</label>
            <label><input id="setting-product-build-your-set" type="checkbox">Zbuduj swój zestaw</label>
            <label><input id="setting-product-lowest-price-proposals" type="checkbox">Propozycje z gwarancją najniższej ceny</label>
            <label><input id="setting-product-price-deals-for-you" type="checkbox">Okazje cenowe dla Ciebie</label>
            <label><input id="setting-product-single-shipment-order" type="checkbox">Zamów w jednej przesyłce</label>
            <label><input id="setting-product-single-shipment-set-order" type="checkbox">Zamów zestaw w jednej przesyłce</label>
            <label><input id="setting-product-new-arrivals" type="checkbox">Nowości</label>
            <label><input id="setting-product-our-product-series" type="checkbox">Nasze serie produktów</label>
            <label><input id="setting-product-proposals-for-you" type="checkbox">Propozycje dla Ciebie</label>
        </div>
        <label><input id="setting-cart" type="checkbox">Koszyk</label>
        <label><input id="setting-favorites" type="checkbox">Ulubione</label>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
