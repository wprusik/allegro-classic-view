<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Allegro Clean View</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            width: 220px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(145deg, #ff9f1a 0%, #ff7a00 100%);
            color: #2f200f;
        }

        .popup {
            display: grid;
            gap: 8px;
        }

        .card {
            background: #fff6ed;
            border: 1px solid #ff8c00;
            border-radius: 8px;
            padding: 8px;
            display: grid;
            gap: 6px;
        }

        .title {
            font-size: 12px;
            font-weight: 700;
            color: #5a2a00;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: #ff7a00;
            cursor: pointer;
        }

        .support {
            display: block;
            border: 1px solid #ff8c00;
            border-radius: 8px;
            padding: 7px 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            background: #fff1e0;
            color: #5a2a00;
        }

        #toggle-extension {
            border: 1px solid #ff8c00;
            border-radius: 8px;
            padding: 8px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            background: #fff1e0;
            color: #5a2a00;
            cursor: pointer;
        }

        #toggle-extension.is-disabled {
            background: #f5dcdc;
            border-color: #c87474;
            color: #6b1f1f;
        }

        #toggle-extension:disabled {
            opacity: 0.7;
            cursor: default;
        }
    </style>
</head>
<body>
<div class="popup">
    <button id="toggle-extension" type="button">Wyłącz wtyczkę</button>
    <div class="card">
        <div class="title">Działanie wtyczki</div>
        <label><input id="setting-product" type="checkbox">Strona produktu</label>
        <label><input id="setting-cart" type="checkbox">Koszyk</label>
        <label><input id="setting-favorites" type="checkbox">Ulubione</label>
    </div>
    <a class="support" href="https://buycoffee.to/wojtasbezportas" target="_blank" rel="noopener noreferrer">Pomogło? Postaw kawę</a>
</div>
<script src="popup.js"></script>
</body>
</html>
